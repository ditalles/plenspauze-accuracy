name: nowcast-logger

# Zelf-pacende logger: één run draait ~5 uur en maakt INTERN elke 10 min een
# opname (sleep-loop), i.p.v. te vertrouwen op GitHubs geplande cron — die wordt
# voor sub-uurlijkse schema's zwaar uitgesteld. Een nieuwe run wordt elke 5 uur
# gestart als opvolger; `concurrency` voorkomt overlap. Voor PUBLIEKE repo's zijn
# de Action-minuten gratis/onbeperkt, dus dit mag continu draaien.
on:
  schedule:
    - cron: '0 */5 * * *' # elke 5 uur een verse run starten
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: logger
  cancel-in-progress: false

jobs:
  log:
    runs-on: ubuntu-latest
    timeout-minutes: 340 # < 6u harde limiet
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Zelf-pacende logger (opname elke 10 min, ~5 uur lang)
        run: |
          git config user.name  "nowcast-logger"
          git config user.email "actions@users.noreply.github.com"
          END=$(( $(date +%s) + 5*3600 ))   # ~5 uur loggen
          N=0
          while [ "$(date +%s)" -lt "$END" ]; do
            node log.mjs || echo "log.mjs faalde, ga door"
            git add data/
            if ! git diff --cached --quiet; then
              git commit -q -m "log: opname $(date -u +%Y-%m-%dT%H:%MZ)"
              git pull --rebase --autostash -q origin "${GITHUB_REF_NAME}" || true
              git push -q || echo "push faalde, volgende keer opnieuw"
            fi
            N=$((N+1))
            echo "opname $N klaar — $(date -u +%H:%M:%SZ)"
            # Stop niet net vóór het einde nog 10 min wachten.
            [ "$(date +%s)" -lt "$END" ] && sleep 600
          done
          echo "Run klaar: $N opnames."
