name: nowcast-logger

# Elke ~15 min een momentopname loggen. Let op: GitHub kan geplande runs onder
# drukte uitstellen — de echte cadans ligt vaak rond 15–25 min. Prima voor backtest.
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {} # handmatig starten via de Actions-tab

# De job committeert de meting terug naar de repo.
permissions:
  contents: write

concurrency:
  group: logger
  cancel-in-progress: false

jobs:
  log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Momentopname loggen
        run: node log.mjs

      - name: Data terugcommitten
        run: |
          git config user.name  "nowcast-logger"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Geen nieuwe data."
          else
            git commit -m "log: momentopname $(date -u +%Y-%m-%dT%H:%MZ)"
            # Rebase-pull tegen races met overlappende runs.
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push
          fi
